name: Awin to Supabase Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated from v4
        with:
          python-version: '3.11'  # Updated to a more recent stable version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
        run: python update_db.py
